<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI家計簿</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg:#f7f6f2; --surface:#fff; --surface2:#f0efe9;
  --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.15);
  --text:#1a1a18; --text2:#6b6b65; --text3:#a8a8a2;
  --green:#2d7a4f; --green-bg:#eaf5ee;
  --red:#c0392b; --red-bg:#fdf0ee;
  --blue:#1a5fa8; --blue-bg:#eaf1fb;
  --accent:#2d7a4f; --radius:14px; --radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}
.top-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.top-bar h1{font-size:17px;font-weight:700;letter-spacing:-0.3px}
.month-pill{margin-left:auto;font-size:12px;background:var(--surface2);padding:4px 10px;border-radius:20px;color:var(--text2);font-family:'DM Mono',monospace}
.summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:16px}
.s-card{background:var(--surface);border-radius:var(--radius);padding:14px 12px;text-align:center;border:1px solid var(--border)}
.s-card .lbl{font-size:11px;color:var(--text3);margin-bottom:5px;letter-spacing:.5px}
.s-card .amt{font-size:16px;font-weight:700;font-family:'DM Mono',monospace;letter-spacing:-.5px}
.tab-bar{display:flex;background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex:1;min-width:64px;padding:12px 6px 10px;font-size:11px;font-family:'Noto Sans JP',sans-serif;font-weight:500;color:var(--text3);background:transparent;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s}
.tab-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.content{padding:16px}
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:16px;margin-bottom:12px}
.sec-label{font-size:12px;font-weight:700;color:var(--text2);letter-spacing:.5px;margin-bottom:12px;text-transform:uppercase}
.form-row{display:flex;gap:8px;margin-bottom:8px}
.form-row select,.form-row input{flex:1;padding:10px 12px;font-size:14px;font-family:'Noto Sans JP',sans-serif;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);outline:none;transition:border-color .15s;-webkit-appearance:none}
.form-row select:focus,.form-row input:focus{border-color:var(--accent)}
.btn{width:100%;padding:13px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;border:none;margin-top:10px;letter-spacing:.2px;transition:opacity .15s,transform .1s}
.btn:active{transform:scale(0.98)}
.btn-blue{background:var(--blue);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-gray{background:var(--surface2);color:var(--text2);border:1px solid var(--border2)}
.toggle-row{display:flex;gap:6px;margin-bottom:14px}
.toggle-btn{flex:1;padding:9px;font-size:13px;font-weight:500;font-family:'Noto Sans JP',sans-serif;border:1px solid var(--border2);border-radius:var(--radius-sm);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s}
.toggle-btn.active{background:var(--surface2);color:var(--text);font-weight:700}
.legend-wrap{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0 4px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.cat-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.cat-row:last-child{border-bottom:none}
.cat-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.cat-info{flex:1;min-width:0}
.cat-name{font-size:13px;font-weight:500}
.cat-bar-wrap{height:5px;background:var(--surface2);border-radius:3px;margin-top:5px;overflow:hidden}
.cat-bar{height:100%;border-radius:3px;transition:width .5s ease}
.cat-right{text-align:right;flex-shrink:0}
.cat-amt{font-size:13px;font-weight:700;font-family:'DM Mono',monospace}
.cat-pct{font-size:10px;color:var(--text3);margin-top:2px}
.list-item{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
.list-item:last-child{border-bottom:none}
.li-icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.li-info{flex:1;min-width:0}
.li-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-sub{font-size:11px;color:var(--text3);margin-top:2px}
.li-amt{font-size:14px;font-weight:700;font-family:'DM Mono',monospace;white-space:nowrap}
.li-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:4px;flex-shrink:0;transition:color .15s}
.li-del:hover{color:var(--red)}
.src-badge{display:inline-block;font-size:9px;padding:2px 6px;border-radius:10px;margin-left:5px;vertical-align:middle;font-weight:700;letter-spacing:.3px}
.sb-manual{background:var(--surface2);color:var(--text2)}
.sb-csv{background:var(--blue-bg);color:var(--blue)}
.empty{text-align:center;padding:36px 16px;color:var(--text3);font-size:14px}
.empty svg{width:40px;height:40px;stroke:var(--text3);fill:none;stroke-width:1.5;margin:0 auto 12px;display:block}
.hidden{display:none!important}
.upload-area{border:2px dashed var(--border2);border-radius:var(--radius-sm);padding:24px 16px;text-align:center;cursor:pointer;transition:background .15s}
.upload-area:hover{background:var(--surface2)}
.upload-area svg{width:32px;height:32px;stroke:var(--text3);fill:none;stroke-width:1.5;margin-bottom:8px}
.upload-area .u-hint{font-size:14px;color:var(--text2);font-weight:500}
.upload-area .u-hint2{font-size:12px;color:var(--text3);margin-top:4px}
.info-box{background:var(--surface2);border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:12px}
.preview-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:8px;table-layout:fixed}
.preview-table th{background:var(--surface2);padding:6px 8px;text-align:left;color:var(--text2);font-weight:700;border-bottom:1px solid var(--border);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.preview-table td{padding:6px 8px;border-bottom:1px solid var(--border);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.col-map{display:flex;flex-direction:column;gap:8px;margin:12px 0}
.col-map-row{display:flex;align-items:center;gap:8px;font-size:13px}
.col-map-row label{flex:0 0 80px;color:var(--text2);font-weight:500}
.col-map-row select{flex:1;padding:7px 10px;font-size:13px;font-family:'Noto Sans JP',sans-serif;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);-webkit-appearance:none}
</style>
</head>
<body>

<div class="top-bar">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--accent)">
    <path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1"/>
    <path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4"/>
  </svg>
  <h1>家計簿</h1>
  <span class="month-pill" id="monthLabel"></span>
</div>

<div class="summary-grid">
  <div class="s-card"><div class="lbl">収入</div><div class="amt" style="color:var(--green)" id="totalIncome">¥0</div></div>
  <div class="s-card"><div class="lbl">支出</div><div class="amt" style="color:var(--red)" id="totalExpense">¥0</div></div>
  <div class="s-card"><div class="lbl">残高</div><div class="amt" id="totalBalance">¥0</div></div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="showTab('chart')">
    <svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>グラフ
  </button>
  <button class="tab-btn" onclick="showTab('csv')">
    <svg viewBox="0 0 24 24"><rect width="20" height="14" x="2" y="5" rx="2"/><path d="M2 10h20"/></svg>カード
  </button>
  <button class="tab-btn" onclick="showTab('manual')">
    <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>手動
  </button>
  <button class="tab-btn" onclick="showTab('history')">
    <svg viewBox="0 0 24 24"><path d="M9 11l3 3 8-8"/><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/></svg>履歴
  </button>
</div>

<div class="content">

  <!-- グラフ -->
  <div id="tab-chart">
    <div class="card">
      <div class="toggle-row">
        <button class="toggle-btn active" id="btnExp" onclick="setMode('expense')">支出カテゴリ</button>
        <button class="toggle-btn" id="btnInc" onclick="setMode('income')">収入カテゴリ</button>
      </div>
      <div style="position:relative;width:100%;height:230px">
        <canvas id="donutChart" role="img" aria-label="カテゴリ別収支グラフ">カテゴリ別の収支グラフ</canvas>
      </div>
      <div class="legend-wrap" id="chartLegend"></div>
    </div>
    <div class="card">
      <div class="sec-label">カテゴリ内訳</div>
      <div id="catList"><div class="empty">データがありません</div></div>
    </div>
  </div>

  <!-- カード明細CSV -->
  <div id="tab-csv" class="hidden">
    <div class="card">
      <div class="sec-label">カード明細CSV取り込み</div>
      <div class="info-box">
        各カード会社の会員サイトからCSVをダウンロードしてアップロードしてください。<br>
        列の対応を手動で指定して取り込めます。
      </div>
      <input type="file" id="csvInput" accept=".csv,text/csv" class="hidden" onchange="onCsvLoad(event)">
      <div class="upload-area" id="csvArea" onclick="document.getElementById('csvInput').click()">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="12" y2="12"/><line x1="15" y1="15" x2="12" y2="12"/></svg>
        <div class="u-hint">CSVファイルを選択</div>
        <div class="u-hint2">タップしてファイルを選ぶ</div>
      </div>

      <div id="csvSetup" class="hidden">
        <div class="sec-label" style="margin-top:14px">列の設定</div>
        <div style="overflow-x:auto;margin-bottom:10px">
          <table class="preview-table" id="previewTable"></table>
        </div>
        <div class="col-map" id="colMap"></div>
        <button class="btn btn-blue" onclick="importCsv()">この設定で取り込む</button>
        <button class="btn btn-gray" onclick="resetCsv()" style="margin-top:6px">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- 手動入力 -->
  <div id="tab-manual" class="hidden">
    <div class="card">
      <div class="sec-label">手動で記録</div>
      <div class="form-row">
        <select id="typeSelect" onchange="updateCats()">
          <option value="expense">支出</option>
          <option value="income">収入</option>
        </select>
        <select id="catSelect"></select>
      </div>
      <div class="form-row">
        <input type="text" id="nameInput" placeholder="メモ（例：ランチ）" maxlength="30">
        <input type="number" id="amtInput" placeholder="金額（円）" min="0">
      </div>
      <input type="date" id="dateInput" style="width:100%;padding:10px 12px;font-size:14px;font-family:'Noto Sans JP',sans-serif;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);outline:none;margin-bottom:0">
      <button class="btn btn-blue" onclick="addManual()">+ 追加する</button>
    </div>
  </div>

  <!-- 履歴 -->
  <div id="tab-history" class="hidden">
    <div class="card" id="historyList">
      <div class="empty">
        <svg viewBox="0 0 24 24"><path d="M9 11l3 3 8-8"/><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/></svg>
        まだ記録がありません
      </div>
    </div>
  </div>

</div>

<script>
const CATS = {
  expense: {
    '食費':   {icon:'🍜',color:'#D85A30'},
    '外食':   {icon:'🍽️',color:'#E24B4A'},
    '交通':   {icon:'🚃',color:'#378ADD'},
    '日用品': {icon:'🛒',color:'#BA7517'},
    '娯楽':   {icon:'🎮',color:'#7F77DD'},
    '医療':   {icon:'💊',color:'#D4537E'},
    '衣類':   {icon:'👕',color:'#1D9E75'},
    '通信':   {icon:'📱',color:'#185FA5'},
    '光熱費': {icon:'💡',color:'#639922'},
    'その他': {icon:'📦',color:'#888780'},
  },
  income: {
    '給与':   {icon:'💴',color:'#1D9E75'},
    '副業':   {icon:'💻',color:'#639922'},
    'その他': {icon:'✨',color:'#888780'},
  }
};

let entries = [
  {id:1,type:'income', category:'給与',  name:'月給',        amount:250000,date:'2026-05-25',source:'manual'},
  {id:2,type:'expense',category:'食費',  name:'スーパー',     amount:8400, date:'2026-05-28',source:'manual'},
  {id:3,type:'expense',category:'交通',  name:'定期券',       amount:12000,date:'2026-05-27',source:'manual'},
  {id:4,type:'expense',category:'娯楽',  name:'Netflix',     amount:1980, date:'2026-05-26',source:'manual'},
  {id:5,type:'expense',category:'外食',  name:'ランチ',       amount:3200, date:'2026-05-29',source:'manual'},
  {id:6,type:'expense',category:'日用品',name:'ドラッグストア',amount:2800, date:'2026-05-30',source:'manual'},
];
let nextId = 7;
let chartMode = 'expense', donutChart = null;
let csvHeaders = [], csvRows = [];

document.getElementById('monthLabel').textContent =
  new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long'});
document.getElementById('dateInput').value = new Date().toISOString().slice(0,10);

const fmt = n => '¥' + Math.round(n).toLocaleString('ja-JP');
const getCat = (type,name) => (CATS[type]&&CATS[type][name])||{icon:'📦',color:'#888780'};

function showTab(name) {
  ['chart','csv','manual','history'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('hidden', t!==name);
  });
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', ['chart','csv','manual','history'][i]===name);
  });
  if (name==='history') renderHistory();
  if (name==='chart')   renderChart();
}

function updateCats() {
  const type = document.getElementById('typeSelect').value;
  document.getElementById('catSelect').innerHTML =
    Object.keys(CATS[type]).map(c=>`<option>${c}</option>`).join('');
}
updateCats();

function setMode(mode) {
  chartMode = mode;
  document.getElementById('btnExp').classList.toggle('active', mode==='expense');
  document.getElementById('btnInc').classList.toggle('active', mode==='income');
  renderChart();
}

function renderSummary() {
  const inc = entries.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
  const exp = entries.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
  document.getElementById('totalIncome').textContent  = fmt(inc);
  document.getElementById('totalExpense').textContent = fmt(exp);
  const bal = inc - exp;
  const el = document.getElementById('totalBalance');
  el.textContent = fmt(Math.abs(bal));
  el.style.color = bal>=0 ? 'var(--blue)' : 'var(--red)';
}

function renderChart() {
  const filtered = entries.filter(e=>e.type===chartMode);
  const total = filtered.reduce((s,e)=>s+e.amount,0);
  const catMap = {};
  filtered.forEach(e=>{ catMap[e.category]=(catMap[e.category]||0)+e.amount; });
  const sorted = Object.entries(catMap).sort((a,b)=>b[1]-a[1]);

  if (donutChart) { donutChart.destroy(); donutChart=null; }

  if (!sorted.length) {
    document.getElementById('chartLegend').innerHTML='';
    document.getElementById('catList').innerHTML='<div class="empty">データがありません</div>';
    return;
  }

  const labels = sorted.map(([k])=>k);
  const data   = sorted.map(([,v])=>v);
  const colors = sorted.map(([k])=>getCat(chartMode,k).color);

  donutChart = new Chart(document.getElementById('donutChart').getContext('2d'), {
    type:'doughnut',
    data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:2,borderColor:'#fff',hoverOffset:6}]},
    options:{
      responsive:true,maintainAspectRatio:false,cutout:'68%',
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:c=>` ${fmt(c.raw)} (${total?Math.round(c.raw/total*100):0}%)`}}
      }
    }
  });

  document.getElementById('chartLegend').innerHTML = sorted.map(([k,v])=>{
    const pct = total?Math.round(v/total*100):0;
    return `<div class="legend-item"><span class="legend-dot" style="background:${getCat(chartMode,k).color}"></span>${k} ${pct}%</div>`;
  }).join('');

  const maxVal = data[0]||1;
  const amtColor = chartMode==='expense'?'var(--red)':'var(--green)';
  document.getElementById('catList').innerHTML = sorted.map(([k,v])=>{
    const cat=getCat(chartMode,k);
    const pct=total?Math.round(v/total*100):0;
    const barW=Math.round(v/maxVal*100);
    return `<div class="cat-row">
      <div class="cat-icon" style="background:${cat.color}22">${cat.icon}</div>
      <div class="cat-info">
        <div class="cat-name">${k}</div>
        <div class="cat-bar-wrap"><div class="cat-bar" style="width:${barW}%;background:${cat.color}"></div></div>
      </div>
      <div class="cat-right">
        <div class="cat-amt" style="color:${amtColor}">${fmt(v)}</div>
        <div class="cat-pct">${pct}%</div>
      </div>
    </div>`;
  }).join('');
}

function renderHistory() {
  const el = document.getElementById('historyList');
  if (!entries.length) {
    el.innerHTML='<div class="empty"><svg viewBox="0 0 24 24"><path d="M9 11l3 3 8-8"/><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/></svg>まだ記録がありません</div>';
    return;
  }
  const sorted = [...entries].sort((a,b)=>b.date.localeCompare(a.date));
  el.innerHTML = sorted.map(e=>{
    const cat=getCat(e.type,e.category);
    const sign=e.type==='income'?'+':'-';
    const color=e.type==='income'?'var(--green)':'var(--red)';
    const srcClass=e.source==='csv'?'sb-csv':'sb-manual';
    const srcLabel=e.source==='csv'?'カード':'手動';
    return `<div class="list-item">
      <div class="li-icon" style="background:${cat.color}22">${cat.icon}</div>
      <div class="li-info">
        <div class="li-name">${e.name}<span class="src-badge ${srcClass}">${srcLabel}</span></div>
        <div class="li-sub">${e.date} · ${e.category}</div>
      </div>
      <div class="li-amt" style="color:${color}">${sign}${fmt(e.amount)}</div>
      <button class="li-del" onclick="delEntry(${e.id})" aria-label="削除">×</button>
    </div>`;
  }).join('');
}

function delEntry(id) {
  entries=entries.filter(e=>e.id!==id);
  renderSummary(); renderHistory(); renderChart();
}

function addManual() {
  const type=document.getElementById('typeSelect').value;
  const cat=document.getElementById('catSelect').value;
  const name=document.getElementById('nameInput').value.trim()||cat;
  const amt=parseInt(document.getElementById('amtInput').value);
  const date=document.getElementById('dateInput').value||new Date().toISOString().slice(0,10);
  if (!amt||amt<=0){alert('金額を入力してください');return;}
  entries.push({id:nextId++,type,category:cat,name,amount:amt,date,source:'manual'});
  document.getElementById('nameInput').value='';
  document.getElementById('amtInput').value='';
  renderSummary();
  showTab('chart');
}

/* CSV取り込み */
function onCsvLoad(e) {
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const text=ev.target.result;
    const lines=text.trim().split(/\r?\n/).filter(l=>l.trim());
    if(lines.length<2){alert('データが見つかりませんでした');return;}

    // BOM除去 & 文字コード対応
    const cleanLine=l=>l.replace(/^\uFEFF/,'');
    const parseLine=l=>{
      const result=[]; let cur=''; let inQ=false;
      for(let i=0;i<l.length;i++){
        if(l[i]==='"'){inQ=!inQ;}
        else if(l[i]===','&&!inQ){result.push(cur.trim());cur='';}
        else{cur+=l[i];}
      }
      result.push(cur.trim()); return result;
    };

    csvHeaders=parseLine(cleanLine(lines[0]));
    csvRows=lines.slice(1,6).map(l=>parseLine(l));

    // プレビュー表示
    document.getElementById('csvArea').classList.add('hidden');
    const table=document.getElementById('previewTable');
    table.innerHTML=`<tr>${csvHeaders.map(h=>`<th>${h}</th>`).join('')}</tr>`+
      csvRows.slice(0,3).map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('');

    // 列マッピングUI
    const noneOpt=`<option value="">-- 選択 --</option>`;
    const headerOpts=csvHeaders.map((h,i)=>`<option value="${i}">${h}</option>`).join('');
    document.getElementById('colMap').innerHTML=`
      <div class="col-map-row"><label>日付列</label><select id="mapDate">${noneOpt}${headerOpts}</select></div>
      <div class="col-map-row"><label>店舗・品目</label><select id="mapName">${noneOpt}${headerOpts}</select></div>
      <div class="col-map-row"><label>金額列</label><select id="mapAmt">${noneOpt}${headerOpts}</select></div>
      <div class="col-map-row"><label>カテゴリ</label><select id="mapCat">
        ${Object.keys(CATS.expense).map(c=>`<option value="${c}">${c}</option>`).join('')}
      </select></div>`;

    // ヘッダー名からカラムを自動推定
    csvHeaders.forEach((h,i)=>{
      const lh=h.toLowerCase();
      if(/日付|date|利用日|使用日/.test(lh)) document.getElementById('mapDate').value=i;
      if(/店名|店舗|品目|内容|摘要|name|merchant|description/.test(lh)) document.getElementById('mapName').value=i;
      if(/金額|amount|利用額|支払|charge/.test(lh)) document.getElementById('mapAmt').value=i;
    });

    // 全行保存
    csvRows=lines.slice(1).map(l=>parseLine(l));
    document.getElementById('csvSetup').classList.remove('hidden');
  };
  reader.readAsText(file,'UTF-8');
}

function importCsv() {
  const di=document.getElementById('mapDate').value;
  const ni=document.getElementById('mapName').value;
  const ai=document.getElementById('mapAmt').value;
  const cat=document.getElementById('mapCat').value;
  if(ni===''||ai===''){alert('店舗・品目列と金額列を選択してください');return;}

  let added=0;
  csvRows.forEach(row=>{
    const name=(row[ni]||'').trim();
    const amtRaw=(row[ai]||'').replace(/[,，\s¥￥]/g,'');
    const amt=parseInt(amtRaw);
    if(!name||isNaN(amt)||amt<=0) return;
    let date=new Date().toISOString().slice(0,10);
    if(di!==''){
      const d=(row[di]||'').replace(/[\/．]/g,'-').trim();
      if(/\d{4}-\d{1,2}-\d{1,2}/.test(d)) date=d;
      else if(/\d{2}-\d{1,2}-\d{1,2}/.test(d)) date='20'+d;
    }
    entries.push({id:nextId++,type:'expense',category:cat,name,amount:amt,date,source:'csv'});
    added++;
  });

  if(added===0){alert('取り込めるデータがありませんでした。列の設定を確認してください。');return;}
  alert(`${added}件を取り込みました！`);
  resetCsv();
  renderSummary();
  showTab('chart');
}

function resetCsv() {
  csvHeaders=[]; csvRows=[];
  document.getElementById('csvArea').classList.remove('hidden');
  document.getElementById('csvSetup').classList.add('hidden');
  document.getElementById('csvInput').value='';
}

renderSummary();
setTimeout(renderChart, 50);
</script>
