<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI家計簿</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg: #f7f6f2;
  --surface: #ffffff;
  --surface2: #f0efe9;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.15);
  --text: #1a1a18;
  --text2: #6b6b65;
  --text3: #a8a8a2;
  --green: #2d7a4f;
  --green-bg: #eaf5ee;
  --red: #c0392b;
  --red-bg: #fdf0ee;
  --blue: #1a5fa8;
  --blue-bg: #eaf1fb;
  --accent: #2d7a4f;
  --radius: 14px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 0 0 80px;
}
.top-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.top-bar h1 {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.3px;
}
.top-bar .month-pill {
  margin-left: auto;
  font-size: 12px;
  background: var(--surface2);
  padding: 4px 10px;
  border-radius: 20px;
  color: var(--text2);
  font-family: 'DM Mono', monospace;
}
.summary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  padding: 16px;
}
.s-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 14px 12px;
  text-align: center;
  border: 1px solid var(--border);
}
.s-card .lbl {
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 5px;
  letter-spacing: 0.5px;
}
.s-card .amt {
  font-size: 16px;
  font-weight: 700;
  font-family: 'DM Mono', monospace;
  letter-spacing: -0.5px;
}
.tab-bar {
  display: flex;
  gap: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.tab-bar::-webkit-scrollbar { display: none; }
.tab-btn {
  flex: 1;
  min-width: 64px;
  padding: 12px 6px 10px;
  font-size: 11px;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 500;
  color: var(--text3);
  background: transparent;
  border: none;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  transition: color .15s;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
}
.tab-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.8; }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.content { padding: 16px; }
.card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 16px;
  margin-bottom: 12px;
}
.sec-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--text2);
  letter-spacing: 0.5px;
  margin-bottom: 12px;
  text-transform: uppercase;
}
.upload-area {
  border: 2px dashed var(--border2);
  border-radius: var(--radius-sm);
  padding: 28px 16px;
  text-align: center;
  cursor: pointer;
  transition: background .15s;
}
.upload-area:hover, .upload-area:active { background: var(--surface2); }
.upload-area svg { width: 36px; height: 36px; stroke: var(--text3); fill: none; stroke-width: 1.5; margin-bottom: 8px; }
.upload-area .u-hint { font-size: 14px; color: var(--text2); font-weight: 500; }
.upload-area .u-hint2 { font-size: 12px; color: var(--text3); margin-top: 4px; }
.info-box {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 12px;
  color: var(--text2);
  line-height: 1.7;
  margin-bottom: 12px;
}
.info-box b { color: var(--text); font-weight: 700; }
.btn {
  width: 100%;
  padding: 13px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 700;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  border: none;
  margin-top: 10px;
  letter-spacing: 0.2px;
  transition: opacity .15s, transform .1s;
}
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-blue { background: var(--blue); color: #fff; }
.btn-green { background: var(--green); color: #fff; }
.loading {
  text-align: center;
  padding: 20px;
  font-size: 13px;
  color: var(--text2);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
.preview-img {
  width: 100%; max-height: 160px; object-fit: contain;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  margin-bottom: 10px;
}
.preview-table {
  width: 100%; border-collapse: collapse;
  font-size: 12px; margin-bottom: 8px;
  table-layout: fixed;
}
.preview-table th {
  background: var(--surface2); padding: 6px 8px;
  text-align: left; color: var(--text2); font-weight: 700;
  border-bottom: 1px solid var(--border);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.preview-table td {
  padding: 6px 8px; border-bottom: 1px solid var(--border);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  color: var(--text);
}
.result-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.result-item:last-child { border-bottom: none; }
.r-icon {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.r-info { flex: 1; min-width: 0; }
.r-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.r-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
.r-amt { font-size: 14px; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--red); white-space: nowrap; }
.form-row { display: flex; gap: 8px; margin-bottom: 8px; }
.form-row select, .form-row input {
  flex: 1; padding: 10px 12px; font-size: 14px;
  font-family: 'Noto Sans JP', sans-serif;
  border: 1px solid var(--border2); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text);
  outline: none; transition: border-color .15s;
  -webkit-appearance: none;
}
.form-row select:focus, .form-row input:focus { border-color: var(--accent); }
.toggle-row { display: flex; gap: 6px; margin-bottom: 14px; }
.toggle-btn {
  flex: 1; padding: 9px; font-size: 13px; font-weight: 500;
  font-family: 'Noto Sans JP', sans-serif;
  border: 1px solid var(--border2); border-radius: var(--radius-sm);
  background: transparent; color: var(--text2); cursor: pointer;
  transition: all .15s;
}
.toggle-btn.active {
  background: var(--surface2); color: var(--text);
  border-color: var(--border2); font-weight: 700;
}
.legend-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0 4px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.cat-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.cat-row:last-child { border-bottom: none; }
.cat-icon {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0;
}
.cat-info { flex: 1; min-width: 0; }
.cat-name { font-size: 13px; font-weight: 500; }
.cat-bar-wrap {
  height: 5px; background: var(--surface2);
  border-radius: 3px; margin-top: 5px; overflow: hidden;
}
.cat-bar { height: 100%; border-radius: 3px; transition: width .5s ease; }
.cat-right { text-align: right; flex-shrink: 0; }
.cat-amt { font-size: 13px; font-weight: 700; font-family: 'DM Mono', monospace; }
.cat-pct { font-size: 10px; color: var(--text3); margin-top: 2px; }
.list-item {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 0; border-bottom: 1px solid var(--border);
}
.list-item:last-child { border-bottom: none; }
.li-icon {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.li-info { flex: 1; min-width: 0; }
.li-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.li-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
.li-amt { font-size: 14px; font-weight: 700; font-family: 'DM Mono', monospace; white-space: nowrap; }
.li-del {
  background: none; border: none; cursor: pointer;
  color: var(--text3); font-size: 18px; padding: 4px; flex-shrink: 0;
  transition: color .15s;
}
.li-del:hover { color: var(--red); }
.src-badge {
  display: inline-block; font-size: 9px; padding: 2px 6px;
  border-radius: 10px; margin-left: 5px; vertical-align: middle;
  font-weight: 700; letter-spacing: 0.3px;
}
.sb-card { background: var(--blue-bg); color: var(--blue); }
.sb-receipt { background: var(--green-bg); color: var(--green); }
.sb-manual { background: var(--surface2); color: var(--text2); }
.empty {
  text-align: center; padding: 36px 16px;
  color: var(--text3); font-size: 14px;
}
.empty svg { width: 40px; height: 40px; stroke: var(--text3); fill: none; stroke-width: 1.5; margin: 0 auto 12px; display: block; }
.hidden { display: none !important; }
</style>
</head>
<body>

<div class="top-bar">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--accent)">
    <path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1"/>
    <path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4"/>
  </svg>
  <h1>AI家計簿</h1>
  <span class="month-pill" id="monthLabel"></span>
</div>

<div class="summary-grid">
  <div class="s-card">
    <div class="lbl">収入</div>
    <div class="amt" style="color:var(--green)" id="totalIncome">¥0</div>
  </div>
  <div class="s-card">
    <div class="lbl">支出</div>
    <div class="amt" style="color:var(--red)" id="totalExpense">¥0</div>
  </div>
  <div class="s-card">
    <div class="lbl">残高</div>
    <div class="amt" id="totalBalance">¥0</div>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="showTab('chart')" id="taббtn-chart">
    <svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
    グラフ
  </button>
  <button class="tab-btn" onclick="showTab('csv')" id="tabbtn-csv">
    <svg viewBox="0 0 24 24"><rect width="20" height="14" x="2" y="5" rx="2"/><path d="M2 10h20"/></svg>
    カード
  </button>
  <button class="tab-btn" onclick="showTab('receipt')" id="tabbtn-receipt">
    <svg viewBox="0 0 24 24"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3z"/><circle cx="12" cy="13" r="3"/></svg>
    レシート
  </button>
  <button class="tab-btn" onclick="showTab('manual')" id="tabbtn-manual">
    <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    手動
  </button>
  <button class="tab-btn" onclick="showTab('history')" id="tabbtn-history">
    <svg viewBox="0 0 24 24"><path d="M9 11l3 3 8-8"/><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/></svg>
    履歴
  </button>
</div>

<div class="content">

  <!-- グラフタブ -->
  <div id="tab-chart">
    <div class="card">
      <div class="toggle-row">
        <button class="toggle-btn active" id="btnExp" onclick="setMode('expense')">支出カテゴリ</button>
        <button class="toggle-btn" id="btnInc" onclick="setMode('income')">収入カテゴリ</button>
      </div>
      <div style="position:relative;width:100%;height:230px">
        <canvas id="donutChart" role="img" aria-label="カテゴリ別収支の円グラフ">カテゴリ別の収支グラフ</canvas>
      </div>
      <div class="legend-wrap" id="chartLegend"></div>
    </div>
    <div class="card">
      <div class="sec-label">カテゴリ内訳</div>
      <div id="catList"><div class="empty">データがありません</div></div>
    </div>
  </div>

  <!-- カード明細タブ -->
  <div id="tab-csv" class="hidden">
    <div class="card">
      <div class="sec-label">カード明細CSV</div>
      <div class="info-box">楽天・三井住友・イオン・JCBなど各社に対応。<br><b>AIが列を自動判定</b>してカテゴリ分けします。</div>
      <input type="file" id="csvInput" accept=".csv,text/csv" class="hidden" onchange="onCsvChange(event)">
      <div class="upload-area" id="csvArea" onclick="document.getElementById('csvInput').click()">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="12" y2="12"/><line x1="15" y1="15" x2="12" y2="12"/></svg>
        <div class="u-hint">CSVファイルを選択</div>
        <div class="u-hint2">各カード会社の会員サイトからダウンロード</div>
      </div>
      <div id="csvLoading" class="hidden loading"><div class="spinner"></div>AIがCSVを解析中...</div>
      <div id="csvResult" class="hidden">
        <div class="sec-label" style="margin-top:14px">プレビュー（先頭3件）</div>
        <div style="overflow-x:auto;margin-bottom:10px"><table class="preview-table" id="previewTable"></table></div>
        <div id="csvItems"></div>
        <button class="btn btn-green" onclick="addAllCsv()">✓ すべて家計簿に追加</button>
      </div>
    </div>
  </div>

  <!-- レシートタブ -->
  <div id="tab-receipt" class="hidden">
    <div class="card">
      <div class="sec-label">レシート読み取り</div>
      <input type="file" id="imgInput" accept="image/*" class="hidden" onchange="onImgChange(event)">
      <img id="previewImg" class="preview-img hidden">
      <div class="upload-area" id="imgArea" onclick="document.getElementById('imgInput').click()">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <div class="u-hint">レシート画像を選択</div>
        <div class="u-hint2">タップして写真を選ぶ</div>
      </div>
      <button class="btn btn-blue hidden" id="scanBtn" onclick="scanReceipt()">✦ AIで読み取る</button>
      <div id="imgLoading" class="hidden loading"><div class="spinner"></div>AIがレシートを解析中...</div>
      <div id="imgResult" class="hidden">
        <div class="sec-label" style="margin-top:14px">読み取り結果</div>
        <div id="imgItems"></div>
        <button class="btn btn-green" onclick="addAllImg()">✓ すべて家計簿に追加</button>
      </div>
    </div>
  </div>

  <!-- 手動入力タブ -->
  <div id="tab-manual" class="hidden">
    <div class="card">
      <div class="sec-label">手動で記録</div>
      <div class="form-row">
        <select id="typeSelect" onchange="updateCats()">
          <option value="expense">支出</option>
          <option value="income">収入</option>
        </select>
        <select id="catSelect"></select>
      </div>
      <div class="form-row">
        <input type="text" id="nameInput" placeholder="メモ（例：ランチ）" maxlength="30">
        <input type="number" id="amtInput" placeholder="金額（円）" min="0">
      </div>
      <button class="btn btn-blue" onclick="addManual()">+ 追加する</button>
    </div>
  </div>

  <!-- 履歴タブ -->
  <div id="tab-history" class="hidden">
    <div class="card" id="historyList">
      <div class="empty">
        <svg viewBox="0 0 24 24"><path d="M9 11l3 3 8-8"/><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/></svg>
        まだ記録がありません
      </div>
    </div>
  </div>

</div>

<script>
const CATS = {
  expense: {
    '食費':   { icon: '🍜', color: '#D85A30' },
    '外食':   { icon: '🍽️', color: '#E24B4A' },
    '交通':   { icon: '🚃', color: '#378ADD' },
    '日用品': { icon: '🛒', color: '#BA7517' },
    '娯楽':   { icon: '🎮', color: '#7F77DD' },
    '医療':   { icon: '💊', color: '#D4537E' },
    '衣類':   { icon: '👕', color: '#1D9E75' },
    '通信':   { icon: '📱', color: '#185FA5' },
    '光熱費': { icon: '💡', color: '#639922' },
    'その他': { icon: '📦', color: '#888780' },
  },
  income: {
    '給与':   { icon: '💴', color: '#1D9E75' },
    '副業':   { icon: '💻', color: '#639922' },
    'その他': { icon: '✨', color: '#888780' },
  }
};

let entries = [
  { id:1, type:'income',  category:'給与',   name:'月給',         amount:250000, date:'2026-05-25', source:'manual' },
  { id:2, type:'expense', category:'食費',   name:'スーパー',      amount:8400,   date:'2026-05-28', source:'manual' },
  { id:3, type:'expense', category:'交通',   name:'定期券',        amount:12000,  date:'2026-05-27', source:'manual' },
  { id:4, type:'expense', category:'娯楽',   name:'Netflix',      amount:1980,   date:'2026-05-26', source:'manual' },
  { id:5, type:'expense', category:'外食',   name:'ランチ',        amount:3200,   date:'2026-05-29', source:'manual' },
  { id:6, type:'expense', category:'日用品', name:'ドラッグストア', amount:2800,   date:'2026-05-30', source:'manual' },
];
let nextId = 7;
let csvScanned = [], imgScanned = [], base64 = null;
let chartMode = 'expense', donutChart = null;

document.getElementById('monthLabel').textContent =
  new Date().toLocaleDateString('ja-JP', { year:'numeric', month:'long' });

const fmt = n => '¥' + Math.round(n).toLocaleString('ja-JP');
const getCat = (type, name) => (CATS[type] && CATS[type][name]) || { icon:'📦', color:'#888780' };
const todayStr = () => new Date().toISOString().slice(0, 10);

function showTab(name) {
  ['chart','csv','receipt','manual','history'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('hidden', t !== name);
    const btn = document.getElementById('tabbtn-' + t) || document.querySelector(`[onclick="showTab('${t}')"]`);
    if (btn) btn.classList.toggle('active', t === name);
  });
  if (name === 'history') renderHistory();
  if (name === 'chart')   renderChart();
}

function updateCats() {
  const type = document.getElementById('typeSelect').value;
  document.getElementById('catSelect').innerHTML =
    Object.keys(CATS[type]).map(c => `<option>${c}</option>`).join('');
}
updateCats();

function setMode(mode) {
  chartMode = mode;
  document.getElementById('btnExp').classList.toggle('active', mode === 'expense');
  document.getElementById('btnInc').classList.toggle('active', mode === 'income');
  renderChart();
}

function renderSummary() {
  const inc = entries.filter(e => e.type==='income').reduce((s,e) => s+e.amount, 0);
  const exp = entries.filter(e => e.type==='expense').reduce((s,e) => s+e.amount, 0);
  document.getElementById('totalIncome').textContent  = fmt(inc);
  document.getElementById('totalExpense').textContent = fmt(exp);
  const bal = inc - exp;
  const el = document.getElementById('totalBalance');
  el.textContent = fmt(Math.abs(bal));
  el.style.color = bal >= 0 ? 'var(--blue)' : 'var(--red)';
}

function renderChart() {
  const filtered = entries.filter(e => e.type === chartMode);
  const total = filtered.reduce((s,e) => s+e.amount, 0);
  const catMap = {};
  filtered.forEach(e => { catMap[e.category] = (catMap[e.category]||0) + e.amount; });
  const sorted = Object.entries(catMap).sort((a,b) => b[1]-a[1]);

  if (donutChart) { donutChart.destroy(); donutChart = null; }

  if (!sorted.length) {
    document.getElementById('chartLegend').innerHTML = '';
    document.getElementById('catList').innerHTML = '<div class="empty">データがありません</div>';
    return;
  }

  const labels = sorted.map(([k]) => k);
  const data   = sorted.map(([,v]) => v);
  const colors = sorted.map(([k]) => getCat(chartMode, k).color);

  donutChart = new Chart(document.getElementById('donutChart').getContext('2d'), {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 2, borderColor: '#fff', hoverOffset: 6 }] },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '68%',
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => ` ${fmt(c.raw)} (${total ? Math.round(c.raw/total*100) : 0}%)` } }
      }
    }
  });

  document.getElementById('chartLegend').innerHTML = sorted.map(([k, v]) => {
    const pct = total ? Math.round(v/total*100) : 0;
    return `<div class="legend-item"><span class="legend-dot" style="background:${getCat(chartMode,k).color}"></span>${k} ${pct}%</div>`;
  }).join('');

  const maxVal = data[0] || 1;
  const amtColor = chartMode === 'expense' ? 'var(--red)' : 'var(--green)';
  document.getElementById('catList').innerHTML = sorted.map(([k, v]) => {
    const cat = getCat(chartMode, k);
    const pct = total ? Math.round(v/total*100) : 0;
    const barW = Math.round(v/maxVal*100);
    return `<div class="cat-row">
      <div class="cat-icon" style="background:${cat.color}22">${cat.icon}</div>
      <div class="cat-info">
        <div class="cat-name">${k}</div>
        <div class="cat-bar-wrap"><div class="cat-bar" style="width:${barW}%;background:${cat.color}"></div></div>
      </div>
      <div class="cat-right">
        <div class="cat-amt" style="color:${amtColor}">${fmt(v)}</div>
        <div class="cat-pct">${pct}%</div>
      </div>
    </div>`;
  }).join('');
}

function renderHistory() {
  const el = document.getElementById('historyList');
  if (!entries.length) {
    el.innerHTML = '<div class="empty"><svg viewBox="0 0 24 24"><path d="M9 11l3 3 8-8"/><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/></svg>まだ記録がありません</div>';
    return;
  }
  const sorted = [...entries].sort((a,b) => b.date.localeCompare(a.date));
  el.innerHTML = sorted.map(e => {
    const cat = getCat(e.type, e.category);
    const sign = e.type === 'income' ? '+' : '-';
    const color = e.type === 'income' ? 'var(--green)' : 'var(--red)';
    const srcClass = e.source==='card' ? 'sb-card' : e.source==='receipt' ? 'sb-receipt' : 'sb-manual';
    const srcLabel = e.source==='card' ? 'カード' : e.source==='receipt' ? 'レシート' : '手動';
    return `<div class="list-item">
      <div class="li-icon" style="background:${cat.color}22">${cat.icon}</div>
      <div class="li-info">
        <div class="li-name">${e.name}<span class="src-badge ${srcClass}">${srcLabel}</span></div>
        <div class="li-sub">${e.date} · ${e.category}</div>
      </div>
      <div class="li-amt" style="color:${color}">${sign}${fmt(e.amount)}</div>
      <button class="li-del" onclick="delEntry(${e.id})" aria-label="削除">×</button>
    </div>`;
  }).join('');
}

function delEntry(id) {
  entries = entries.filter(e => e.id !== id);
  renderSummary(); renderHistory(); renderChart();
}

function addManual() {
  const type = document.getElementById('typeSelect').value;
  const cat  = document.getElementById('catSelect').value;
  const name = document.getElementById('nameInput').value.trim() || cat;
  const amt  = parseInt(document.getElementById('amtInput').value);
  if (!amt || amt <= 0) { alert('金額を入力してください'); return; }
  entries.push({ id:nextId++, type, category:cat, name, amount:amt, date:todayStr(), source:'manual' });
  document.getElementById('nameInput').value = '';
  document.getElementById('amtInput').value  = '';
  renderSummary();
  showTab('chart');
}

function renderScannedItems(items, containerId) {
  const el = document.getElementById(containerId);
  if (!items.length) { el.innerHTML = '<div class="empty">読み取れませんでした。別の画像をお試しください。</div>'; return; }
  el.innerHTML = items.map(item => {
    const cat = getCat('expense', item.category);
    return `<div class="result-item">
      <div class="r-icon" style="background:${cat.color}22">${cat.icon}</div>
      <div class="r-info">
        <div class="r-name">${item.name}</div>
        <div class="r-sub">${item.date || todayStr()} · ${item.category}</div>
      </div>
      <div class="r-amt">-${fmt(item.amount)}</div>
    </div>`;
  }).join('');
}

async function onCsvChange(e) {
  const file = e.target.files[0];
  if (!file) return;
  const text = await file.text();
  document.getElementById('csvArea').classList.add('hidden');
  document.getElementById('csvLoading').classList.remove('hidden');
  document.getElementById('csvResult').classList.add('hidden');

  const lines = text.trim().split('\n').slice(0, 8).join('\n');
  const catList = Object.keys(CATS.expense).join('、');
  const prompt = `以下はクレジットカード明細のCSVデータです。\n---\n${lines}\n---\nこのCSVを解析して、支出の取引リストをJSON配列で返してください。カテゴリは次から選んでください: ${catList}、その他\n\n必ず以下のJSON形式のみで返してください（説明文や\`\`\`は不要）:\n[{"name":"店舗名","amount":金額(数値),"date":"YYYY-MM-DD","category":"カテゴリ名"}]\n\n日付不明なら今日の日付。合計行・返金・マイナスは除外。`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:2000, messages:[{role:'user',content:prompt}] })
    });
    const data = await res.json();
    const raw = data.content.map(b=>b.text||'').join('').trim().replace(/```json|```/g,'').trim();
    let items = []; try { items = JSON.parse(raw); } catch(err) { items = []; }
    csvScanned = items.filter(i => i.name && i.amount > 0);
    const rows = csvScanned.slice(0,3);
    document.getElementById('previewTable').innerHTML = rows.length
      ? `<tr><th>日付</th><th>品目</th><th>カテゴリ</th><th>金額</th></tr>` + rows.map(r=>`<tr><td>${r.date}</td><td>${r.name}</td><td>${r.category}</td><td>${fmt(r.amount)}</td></tr>`).join('')
      : '';
    renderScannedItems(csvScanned, 'csvItems');
    document.getElementById('csvResult').classList.remove('hidden');
  } catch(err) {
    csvScanned = [];
    renderScannedItems([], 'csvItems');
    document.getElementById('csvResult').classList.remove('hidden');
  }
  document.getElementById('csvLoading').classList.add('hidden');
}

function addAllCsv() {
  csvScanned.forEach(item => entries.push({ id:nextId++, type:'expense', category:item.category, name:item.name, amount:item.amount, date:item.date||todayStr(), source:'card' }));
  csvScanned = [];
  document.getElementById('csvArea').classList.remove('hidden');
  document.getElementById('csvResult').classList.add('hidden');
  document.getElementById('csvInput').value = '';
  renderSummary(); showTab('chart');
}

function onImgChange(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    base64 = ev.target.result.split(',')[1];
    const img = document.getElementById('previewImg');
    img.src = ev.target.result; img.classList.remove('hidden');
    document.getElementById('imgArea').classList.add('hidden');
    document.getElementById('scanBtn').classList.remove('hidden');
    document.getElementById('imgResult').classList.add('hidden');
  };
  reader.readAsDataURL(file);
}

async function scanReceipt() {
  document.getElementById('scanBtn').classList.add('hidden');
  document.getElementById('imgLoading').classList.remove('hidden');
  document.getElementById('imgResult').classList.add('hidden');
  const catList = Object.keys(CATS.expense).join('、');
  const prompt = `このレシート画像を解析して購入品目と金額をJSON配列で返してください。\nカテゴリ: ${catList}\n形式（説明文不要）:\n[{"name":"品目名","amount":金額,"category":"カテゴリ名"}]\n読み取れない場合は []`;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000, messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:base64}},{type:'text',text:prompt}]}] })
    });
    const data = await res.json();
    const raw = data.content.map(b=>b.text||'').join('').trim().replace(/```json|```/g,'').trim();
    let items=[]; try{items=JSON.parse(raw);}catch(e){items=[];}
    imgScanned = items.filter(i=>i.name&&i.amount>0);
    renderScannedItems(imgScanned, 'imgItems');
    document.getElementById('imgResult').classList.remove('hidden');
  } catch(err) {
    imgScanned=[];
    renderScannedItems([], 'imgItems');
    document.getElementById('imgResult').classList.remove('hidden');
  }
  document.getElementById('imgLoading').classList.add('hidden');
}

function addAllImg() {
  imgScanned.forEach(item => entries.push({id:nextId++,type:'expense',category:item.category,name:item.name,amount:item.amount,date:todayStr(),source:'receipt'}));
  imgScanned=[]; base64=null;
  document.getElementById('previewImg').classList.add('hidden');
  document.getElementById('imgArea').classList.remove('hidden');
  document.getElementById('scanBtn').classList.add('hidden');
  document.getElementById('imgResult').classList.add('hidden');
  document.getElementById('imgInput').value='';
  renderSummary(); showTab('chart');
}

renderSummary();
setTimeout(renderChart, 50);
</script>
